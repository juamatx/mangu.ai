<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #111111;
    --card-hover: #181818;
    --red: #6c8cff;
    --gold: #f0a500;
    --juan: #e05297;
    --teal: #4ecdc4;
    --white: #f0ece2;
    --gray: #888;
    --dim: #444;
    --match-green: #b48eff;
    --oscar-bg: #1a1710;
    --oscar-border: #c9a84c;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 60px 20px 20px;
  }
  .header::after {
    content: '';
    display: block;
    width: 80%;
    max-width: 700px;
    height: 2px;
    background: var(--gold);
    margin: 30px auto 0;
  }
  .header-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .header h1 .josh     { color: var(--red);  }
  .header h1 .juan     { color: var(--juan); }
  .header h1 .giuseppe { color: var(--teal); }
  .header h1 .vs       { color: var(--dim); font-weight: 400; font-style: italic; font-size: 0.6em; }
  .header .subtitle {
    font-size: 16px;
    font-weight: 300;
    color: var(--gray);
    letter-spacing: 1px;
  }

  /* ── COLUMN HEADERS ── */
  .col-headers {
    max-width: 960px;
    margin: 40px auto 0;
    padding: 0 20px 12px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
  }
  .col-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    text-align: center;
  }
  .col-header.josh-h     { color: var(--red); }
  .col-header.juan-h     { color: var(--juan); }
  .col-header.giuseppe-h { color: var(--teal); }
  .col-header.oscar-h    { color: var(--oscar-border); }

  /* ── CARDS ── */
  .categories {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .category-card {
    background: var(--card-bg);
    border-left: 3px solid transparent;
    margin-bottom: 2px;
    padding: 20px 24px 18px;
    transition: background 0.25s, border-left-color 0.25s;
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
  }
  .category-card:hover {
    background: var(--card-hover);
    border-left-color: var(--red);
  }

  /* ── CATEGORY LABEL ── */
  .category-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.7;
    padding-bottom: 14px;
    border-bottom: 1px solid #222;
    margin-bottom: 16px;
  }

  /* ── PICKS ROW ── */
  .picks-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 14px;
    align-items: start;
  }

  .pick-cell { position: relative; }
  .pick-cell.juan     { text-align: center; }
  .pick-cell.giuseppe { text-align: center; }
  .pick-cell.oscar    { text-align: right;  }

  /* ── POSTER ── */
  .poster-wrap {
    width: 100%;
    aspect-ratio: 1/1;
    max-height: 120px;
    max-width: 120px;
    margin-bottom: 8px;
    border-radius: 5px;
    overflow: hidden;
    background: #1c1c1c;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pick-cell.juan     .poster-wrap { margin-left: auto; margin-right: auto; }
  .pick-cell.giuseppe .poster-wrap { margin-left: auto; margin-right: auto; }
  .pick-cell.oscar    .poster-wrap { margin-left: auto; }

  .poster-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .poster-wrap img.loaded { opacity: 1; }

  .poster-fallback {
    font-size: 28px;
    color: var(--dim);
  }

  /* green glow on matched poster */
  .poster-wrap.matched-poster {
    box-shadow: 0 0 0 2px var(--match-green);
  }

  /* ── PICK TEXT ── */
  .pick-owner {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .pick-cell.josh     .pick-owner { color: var(--red);  }
  .pick-cell.juan     .pick-owner { color: var(--juan); }
  .pick-cell.giuseppe .pick-owner { color: var(--teal); }
  .pick-cell.oscar    .pick-owner { color: var(--oscar-border); }

  /* Oscar winner column */
  .pick-cell.oscar {
    background: var(--oscar-bg);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 6px;
    padding: 10px;
  }
  .pick-cell.oscar .poster-wrap {
    box-shadow: 0 0 0 2px var(--oscar-border);
    margin-left: auto;
  }
  .pick-cell.oscar .pick-name {
    color: var(--oscar-border);
  }
  .pick-cell.oscar .pick-owner {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pick-cell.oscar .pick-owner::before {
    content: '🏆';
    font-size: 10px;
  }
  .pick-cell.oscar.tbd {
    opacity: 0.3;
    border-style: dashed;
  }
  .pick-cell.oscar.tbd .pick-name {
    color: var(--dim);
    font-style: italic;
  }

  .pick-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }
  .pick-name.matched {
    color: #b48eff;
  }

  .pick-name.correct {
    color: var(--oscar-border);
  }

  .poster-wrap.correct-poster {
    box-shadow: 0 0 0 2px var(--oscar-border);
  }

  .vote-pct {
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    margin-top: 3px;
  }
  .pick-name.matched + .vote-pct {
    color: rgba(180, 142, 255, 0.5);
  }
  .pick-name.correct + .vote-pct {
    color: rgba(201, 168, 76, 0.6);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 40px 20px 60px;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  @media (max-width: 640px) {
    .picks-row { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
    .poster-wrap { max-height: 70px; max-width: 70px; }
    .pick-name { font-size: 11px; }
    .pick-owner { font-size: 7px; }
    .vote-pct { font-size: 7px; }
    .category-label { font-size: 13px; }
    .category-card { padding: 12px 10px; }
    .pick-cell.oscar { padding: 6px; }
  }
</style>

    let nameCls = '';

    if (hasWinner) {
      // Compare pick to winner — check both nominee name and film name
      const gotIt = data.pick === winner.pick || data.pick === winner.film;
      if (gotIt) {
        posterCls = ' correct-poster';
        nameCls = ' correct';
      }
    } else {
      // No winner yet — show purple for matching picks
      const others = ['josh','juan','giuseppe'].filter(v => v !== person);
      const matchesAnother = others.some(v => p[v].pick === data.pick);
      if (matchesAnother) {
        posterCls = ' matched-poster';
        nameCls = ' matched';
      }
    }

    const src = data.image ? data.image.replace('/w_300', '/w_500') : '';
    const img = src
      ? `<img src="${src}" alt="${data.pick}" onload="this.classList.add('loaded')">`
      : `<span class="poster-fallback">🎬</span>`;

    return `<div class="pick-cell ${person}">
      <div class="poster-wrap${posterCls}">${img}</div>
      <span class="pick-owner">${person.charAt(0).toUpperCase() + person.slice(1)}</span>
      <div class="pick-name${nameCls}">${data.pick}</div>
      <span class="vote-pct">${data.vote} of critics agree</span>
    </div>`;
  };

  const oscarCell = hasWinner
    ? `<div class="pick-cell oscar">
        <div class="poster-wrap">${winner.image ? `<img src="${winner.image}" alt="${winner.display || winner.pick}" onload="this.classList.add('loaded')">` : `<span class="poster-fallback">🏆</span>`}</div>
        <span class="pick-owner">Winner</span>
        <div class="pick-name">${winner.display || winner.pick}</div>
      </div>`
    : `<div class="pick-cell oscar tbd">
        <div class="poster-wrap"><span class="poster-fallback">?</span></div>
        <span class="pick-owner">Winner</span>
        <div class="pick-name">TBD</div>
      </div>`;

  const card = document.createElement('div');
  card.className = 'category-card';
  card.style.animationDelay = `${i * 0.04}s`;
  card.innerHTML = `
    <div class="category-label">${p.category}</div>
    <div class="picks-row">
      ${cell('josh',     p.josh)}
      ${cell('juan',     p.juan)}
      ${cell('giuseppe', p.giuseppe)}
      ${oscarCell}
    </div>`;
  container.appendChild(card);
});
</script>

</body>
</html>
